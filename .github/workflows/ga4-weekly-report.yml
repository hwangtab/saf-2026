name: GA4 Weekly Report

on:
  schedule:
    # 매주 월요일 09:00 Asia/Seoul = 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run GA4 quick check
        id: ga4
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          output=$(node scripts/ga4-quick-check.js)
          echo "$output"
          {
            echo "report<<__GA4_REPORT_EOF__"
            echo "$output"
            echo "__GA4_REPORT_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.ga4.outputs.report }}
        with:
          script: |
            const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' });
            const body = [
              `# GA4 주간 리포트 — ${today}`,
              '',
              '`scripts/ga4-quick-check.js` 자동 실행 결과입니다.',
              '',
              '```',
              process.env.REPORT,
              '```',
              '',
              `<sub>Workflow run: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})</sub>`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GA4 주간 리포트 — ${today}`,
              body,
            });
