name: GA4 Weekly Report

on:
  schedule:
    # 매주 월요일 09:00 Asia/Seoul = 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run GA4 quick check
        id: ga4
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_OAUTH_CLIENT_ID: ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET: ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN: ${{ secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: |
          set -e
          output=$(node scripts/ga4-quick-check.js)
          echo "$output"
          {
            echo "report<<__GA4_REPORT_EOF__"
            echo "$output"
            echo "__GA4_REPORT_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue (성공)
        if: success()
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.ga4.outputs.report }}
        with:
          script: |
            const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '# GA4 주간 리포트 — ' + today,
              '',
              '`scripts/ga4-quick-check.js` 자동 실행 결과입니다.',
              '',
              '```',
              process.env.REPORT,
              '```',
              '',
              '<sub>Workflow run: [' + context.runId + '](' + runUrl + ')</sub>',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'GA4 주간 리포트 — ' + today,
              body,
            });

      - name: Create issue (실패 알림)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['ga4-auth-failure'],
            });
            if (existing.data.length > 0) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'GA4 주간 리포트 실패 — ' + today,
              labels: ['ga4-auth-failure'],
              body: 'GA4 weekly report 실패. [실행 로그](' + runUrl + ')\n\n`node scripts/ga4-quick-check.js` 로컬 실행으로 인증 상태 확인하세요.',
            });
