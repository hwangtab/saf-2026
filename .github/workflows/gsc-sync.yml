name: GSC Sync (Daily)

on:
  schedule:
    # 매일 05:00 Asia/Seoul = 20:00 UTC (전날)
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      daysBack:
        description: '몇 일치 fetch (기본 7, 백필 시 28)'
        required: false
        default: '7'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: GSC → Supabase sync
        id: sync
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DAYS_BACK: ${{ github.event.inputs.daysBack || '7' }}
        run: |
          node -e "
            const { google } = require('googleapis');
            const { createClient } = require('@supabase/supabase-js');

            const SITE_URL = process.env.GSC_SITE_URL || 'sc-domain:saf2026.com';
            const DAYS_BACK = parseInt(process.env.DAYS_BACK || '7', 10);
            const SUPABASE_URL = process.env.NEXT_PUBLIC_SUPABASE_URL;
            const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;

            if (!SUPABASE_URL || !SUPABASE_KEY) { console.error('Supabase env 미설정'); process.exit(1); }

            let auth;
            const SA_KEY_JSON = process.env.GSC_SERVICE_ACCOUNT_KEY;
            if (SA_KEY_JSON) {
              const key = JSON.parse(SA_KEY_JSON);
              auth = new google.auth.JWT({
                email: key.client_email,
                key: key.private_key,
                scopes: ['https://www.googleapis.com/auth/webmasters.readonly'],
              });
              console.log('인증: Service Account (' + key.client_email + ')');
            } else {
              const id = process.env.GSC_OAUTH_CLIENT_ID;
              const secret = process.env.GSC_OAUTH_CLIENT_SECRET;
              const rt = process.env.GSC_OAUTH_REFRESH_TOKEN;
              if (!id || !secret || !rt) { console.error('GSC 인증 미설정'); process.exit(1); }
              const oauth2 = new google.auth.OAuth2(id, secret);
              oauth2.setCredentials({ refresh_token: rt });
              auth = oauth2;
              console.log('인증: OAuth refresh token');
            }

            const wm = google.webmasters({ version: 'v3', auth });
            const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
              auth: { persistSession: false, autoRefreshToken: false },
            });

            async function fetchDay(date) {
              const res = await wm.searchanalytics.query({
                siteUrl: SITE_URL,
                requestBody: {
                  startDate: date, endDate: date,
                  dimensions: ['query', 'page'],
                  rowLimit: 5000,
                  dataState: 'final',
                },
              });
              return (res.data.rows ?? []).map(r => ({
                date,
                query: r.keys?.[0] ?? null,
                page:  r.keys?.[1] ?? null,
                impressions: Math.round(Number(r.impressions ?? 0)),
                clicks:      Math.round(Number(r.clicks ?? 0)),
                ctr:         Math.round(Number(r.ctr ?? 0) * 10000) / 10000,
                position:    Math.round(Number(r.position ?? 0) * 100) / 100,
              }));
            }

            (async () => {
              const dates = [];
              for (let i = 2; i < 2 + DAYS_BACK; i++) {
                const d = new Date();
                d.setUTCDate(d.getUTCDate() - i);
                dates.push(d.toISOString().slice(0, 10));
              }
              console.log('Site: ' + SITE_URL);
              console.log('범위: ' + dates[dates.length - 1] + ' ~ ' + dates[0] + ' (' + DAYS_BACK + '일)');

              let totalRows = 0;
              let failedDates = [];
              for (const date of dates) {
                try {
                  const rows = await fetchDay(date);
                  if (rows.length === 0) { console.log('  ' + date + ': 0 rows (skip)'); continue; }
                  const { error } = await supabase.from('gsc_metrics').upsert(rows, { onConflict: 'date,query,page' });
                  if (error) { console.error('  ' + date + ': upsert 실패 — ' + error.message); failedDates.push(date); }
                  else { totalRows += rows.length; console.log('  ' + date + ': ' + rows.length + ' rows OK'); }
                } catch (e) {
                  console.error('  ' + date + ': fetch 실패 — ' + e.message);
                  failedDates.push(date);
                }
              }

              const cutoff = new Date();
              cutoff.setUTCDate(cutoff.getUTCDate() - 30);
              const { count: deleted } = await supabase.from('gsc_metrics').delete({ count: 'exact' }).lt('date', cutoff.toISOString().slice(0, 10));
              if (deleted > 0) console.log('cleanup: ' + deleted + '개 삭제 (30일 이전)');

              console.log('\n완료: ' + totalRows + '개 row upsert, ' + failedDates.length + '개 날짜 실패');
              if (failedDates.length > 0 && failedDates.length === DAYS_BACK) process.exit(1);
            })();
          "

      - name: Issue 생성 (전체 실패 시에만)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' });
            const runUrl = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: ['gsc-sync-failure'],
            });
            if (existing.data.length > 0) { console.log('issue already open:', existing.data[0].number); return; }

            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'GSC sync 실패 — ' + today,
              labels: ['gsc-sync-failure'],
              body: [
                '## GSC daily sync 실패',
                '',
                '**날짜**: ' + today,
                '**워크플로**: [실행 로그](' + runUrl + ')',
                '',
                '### 원인 후보',
                '1. **SA 권한** — `node scripts/gsc-grant-sa-access.js list` 로 siteOwner 확인',
                '2. **SA key 만료·변경** — GCP Console → Service Accounts',
                '3. **Supabase 접속 실패** — SUPABASE_SERVICE_ROLE_KEY 유효성 확인',
                '',
                '### 즉시 조치',
                '```bash',
                'node scripts/gsc-grant-sa-access.js list',
                'gh workflow run gsc-sync.yml -f daysBack=7',
                '```',
              ].join('\n'),
            });
