name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci --passWithNoTests

      - name: Validate artworks
        run: npm run validate-artworks

      - name: Build (npm run build로 chain된 verify:i18n-placeholders 가드까지 실행)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_KAKAO_MAP_KEY: placeholder
          NEXT_PUBLIC_KAKAO_JS_KEY: placeholder

  e2e-a11y:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_KAKAO_MAP_KEY: placeholder
          NEXT_PUBLIC_KAKAO_JS_KEY: placeholder
          NEXT_PUBLIC_TOSS_DOMESTIC_CLIENT_KEY: test_ck_ci
          TOSS_PAYMENTS_DOMESTIC_SECRET_KEY: test_sk_ci

      - name: Start server and run a11y tests
        run: |
          npm run start &
          timeout 60 bash -c 'until curl -fs http://localhost:3000 > /dev/null; do sleep 2; done'
          npm run test:a11y
        env:
          CI: true
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_KAKAO_MAP_KEY: placeholder
          NEXT_PUBLIC_KAKAO_JS_KEY: placeholder
          NEXT_PUBLIC_TOSS_DOMESTIC_CLIENT_KEY: test_ck_ci
          TOSS_PAYMENTS_DOMESTIC_SECRET_KEY: test_sk_ci

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
