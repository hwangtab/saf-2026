name: GA4 Health Check (Daily)

on:
  schedule:
    # 매일 09:00 Asia/Seoul = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: GA4 ping (최소 쿼리)
        id: ping
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_OAUTH_CLIENT_ID: ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET: ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN: ${{ secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: |
          node -e "
            const { runReport } = require('./scripts/lib/ga4-auth');
            runReport({
              dateRanges: [{ startDate: '1daysAgo', endDate: 'today' }],
              metrics: [{ name: 'totalUsers' }],
            }).then(r => {
              const users = r.rows?.[0]?.metricValues?.[0]?.value ?? '0';
              console.log('GA4 OK — yesterday users:', users);
            }).catch(e => { console.error(e.message); process.exit(1); });
          "

      - name: Issue 생성 (실패 시에만)
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['ga4-auth-failure'],
            });
            if (existing.data.length > 0) {
              console.log('GA4 auth failure issue already open:', existing.data[0].number);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GA4 인증 실패 — ${today}`,
              labels: ['ga4-auth-failure'],
              body: [
                '## GA4 daily health check 실패',
                '',
                '**날짜**: ' + today,
                '**워크플로**: [실행 로그](' + runUrl + ')',
                '',
                '### 원인 후보',
                '1. **Service Account** — GA4 Property Access에서 뷰어 권한 취소됐는지 확인',
                '2. **OAuth refresh token** — 만료 또는 취소 (GA4_OAUTH_REFRESH_TOKEN)',
                '',
                '### 즉시 조치',
                '```bash',
                '# 로컬에서 원인 확인',
                'node scripts/ga4-quick-check.js',
                '',
                '# SA 권한 재부여 필요 시',
                '# .env.local에 GA4_ADMIN_ACCESS_TOKEN=<analytics.manage.users 스코프 token> 추가 후:',
                'node scripts/ga4-grant-sa-access.js',
                '```',
                '',
                '### 영구 해결 확인',
                '- GA4 Admin → 속성 액세스 관리: `saf2026-ga-reader@saf2026.iam.gserviceaccount.com` 뷰어 여부',
                '- Vercel/GitHub Secrets: `GA4_SERVICE_ACCOUNT_KEY` 값 유효성',
              ].join('\n'),
            });
