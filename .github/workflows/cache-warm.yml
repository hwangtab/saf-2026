name: Cache Warm (post-deploy)

# Vercel production 배포가 성공하면 핵심 페이지를 한 번씩 미리 GET해서
# ISR 캐시를 hot 상태로 만든다. 결과: 첫 사용자(또는 PSI 측정)가 도착했을 때
# cold ISR 빌드 1초+가 아닌 hit 캐시(~50-200ms TTFB)에서 시작.
#
# 트리거: Vercel이 GitHub에 deployment_status: success 이벤트를 보낼 때.
# 작동 환경: production만 (preview 제외)
#
# 비용: 페이지당 1번 GET = 배포당 ~12 function invocations.
# 하루 평균 5번 배포 가정 시 월 ~1,800건 — Vercel Hobby 100k/월의 1.8%.

on:
  deployment_status:
  workflow_dispatch:

jobs:
  warm:
    name: Warm Vercel ISR cache
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production') }}
    steps:
      - name: Wait for Vercel edge propagation
        run: sleep 10

      - name: Warm critical pages
        run: |
          set -u
          urls=(
            # 핵심 진입 (홈/마켓)
            'https://www.saf2026.com/'
            'https://www.saf2026.com/ko'
            'https://www.saf2026.com/en'
            'https://www.saf2026.com/artworks'
            # 캠페인 정체성 (마케팅 push 대상)
            'https://www.saf2026.com/petition/oh-yoon'
            'https://www.saf2026.com/special/oh-yoon'
            'https://www.saf2026.com/our-reality'
            'https://www.saf2026.com/about'
            'https://www.saf2026.com/our-proof'
            'https://www.saf2026.com/archive/2026'
            # 매거진·콘텐츠 진입 (SEO + AI citation)
            'https://www.saf2026.com/stories'
            # 영문 캠페인 진입
            'https://www.saf2026.com/en/about'
          )
          failed=0
          for url in "${urls[@]}"; do
            echo "→ Warming: $url"
            if curl -fsSL -o /dev/null \
                 -w "  HTTP %{http_code} · TTFB %{time_starttransfer}s · total %{time_total}s\n" \
                 -A 'GitHub-Action-CacheWarm/1.0 (saf-2026 post-deploy)' \
                 --max-time 30 \
                 "$url"; then
              :
            else
              echo "  ⚠ failed (continuing)"
              failed=$((failed + 1))
            fi
          done
          echo
          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed URL(s) failed to warm. ISR cold path may persist."
          else
            echo "::notice::All ${#urls[@]} URLs warmed successfully."
          fi

      # 작품 상세는 generateStaticParams가 빈 배열(빌드 안정성 트레이드오프 — 페이지당
      # Supabase 쿼리 9건)이라 배포마다 ~900 URL(451점 × 2 locale)이 전부 cold로 리셋된다.
      # sitemap에서 작품 URL 상위 N건을 뽑아 동시 4개로 워밍 — 구매 전환 핵심 페이지의
      # 첫 방문 TTFB(cold ~2-4s)를 hit 캐시로 전환 (2026-06-12 감사).
      # 순차 실행이면 cold 60건 × 2-4s ≈ 2-4분(최악 30분)이라 -P4 병렬 + step timeout으로 bound.
      - name: Warm artwork detail pages (top of sitemap)
        timeout-minutes: 8
        run: |
          set -u
          LIMIT=60
          echo "→ Fetching sitemap for artwork URLs (limit $LIMIT)"
          curl -fsSL --max-time 30 'https://www.saf2026.com/sitemap.xml' \
            | grep -o '<loc>https://www.saf2026.com/artworks/[0-9a-f-]\{36\}</loc>' \
            | sed -e 's|</\?loc>||g' \
            | head -n "$LIMIT" > artwork-urls.txt
          count=$(wc -l < artwork-urls.txt)
          echo "  found $count artwork URLs"
          if [ "$count" -eq 0 ]; then
            echo "::warning::no artwork URLs found in sitemap — warm pass is a no-op (sitemap fetch/grep 확인 필요)"
          fi
          # 실패는 개별 URL 단위로만 보고 (전체 step은 계속) — || true로 xargs 종료코드 흡수
          xargs -P 4 -n 1 -I{} curl -fsSL -o /dev/null \
            -w "  HTTP %{http_code} · TTFB %{time_starttransfer}s · {}\n" \
            -A 'GitHub-Action-CacheWarm/1.0 (saf-2026 post-deploy)' \
            --max-time 30 \
            "{}" < artwork-urls.txt || echo "::warning::some artwork URL(s) failed to warm."
          echo "::notice::artwork warm pass finished ($count URLs attempted)."
