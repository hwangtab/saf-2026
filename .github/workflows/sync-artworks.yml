name: Sync artworks from DB

on:
  schedule:
    - cron: '0 3 * * *' # 매일 KST 12:00 (UTC 03:00)
  workflow_dispatch: # 수동 실행 가능

concurrency:
  group: sync-artworks
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync artworks from Supabase
        run: npm run sync-artworks
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet content/artworks-batches/batch-db-generated.ts \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'chore(content): sync artworks from DB'
          body: |
            DB에서 작품 데이터를 자동 동기화했습니다.

            - `content/artworks-batches/batch-db-generated.ts` 업데이트
            - 변경된 작품 목록은 파일 diff를 확인하세요.
          branch: chore/sync-artworks
          commit-message: 'chore(content): sync artworks from DB'
          delete-branch: true
